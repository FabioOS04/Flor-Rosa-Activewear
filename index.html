<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Flor Rosa Activewear</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #000;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
    }
    .card img {
      width: 100%;
      border-radius: 10px;
    }
    .price {
      font-weight: bold;
      margin: 10px 0;
    }
    .btn {
      background: #25D366;
      color: #fff;
      padding: 10px;
      display: inline-block;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <h1>Tienda Fit</h1>
  <p>Compra directo por WhatsApp</p>
</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <h3>Top Aura Cross</h3>
    <p class="price">₡18.800</p>
    <a class="btn" href="https://wa.me/50687050942?ttext=Me%20encantaría%20comprar%20este%20producto">
      Comprar
    </a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <h3>Short Fit Pro </h3>
    <p class="price">₡16.500</p>
    <a class="btn" href="https://wa.me/50687050942?text=Me%20encantaría%20comprar%20este%20producto">
      Comprar
    </a>
  </div>

</div>

</body>
</html>
